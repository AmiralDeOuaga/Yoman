    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    .subtitle { color: #7a90b8; font-size: 13px; text-align: center; margin-bottom: 48px; }

    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); gap: 32px; max-width: 1300px; margin: 0 auto; }

    .post-wrap { display: flex; flex-direction: column; gap: 12px; }
    .post-label { font-family: 'Montserrat', sans-serif; font-size: 12px; font-weight: 700; color: #7a90b8; text-transform: uppercase; letter-spacing: 1px; }
    .post-dl { display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.1); border-radius: 10px; padding: 8px 14px; font-size: 12px; font-weight: 700; color: #7ab3ff; font-family: 'Montserrat', sans-serif; cursor: pointer; transition: background .2s; width: fit-content; }

    /* ── POST FRAME: 1080×1080 scaled to fit ── */
    .frame-outer { width: 100%; aspect-ratio: 1; border-radius: 16px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,.6); }
    .frame { width: 1080px; height: 1080px; transform-origin: top left; position: relative; overflow: hidden; }

    .f-bg-dark { background: linear-gradient(150deg, #080e1e 0%, #0d1a3a 60%, #0a2060 100%); }
    .f-bg-gold { background: linear-gradient(150deg, #1a1000 0%, #2a1c00 50%, #3d2800 100%); }
    .f-bg-green { background: linear-gradient(150deg, #001810 0%, #002a1a 50%, #003d28 100%); }
    .f-bg-red { background: linear-gradient(150deg, #1a0008 0%, #2a000e 50%, #3d0015 100%); }
    .f-bg-purple { background: linear-gradient(150deg, #0d0020 0%, #1a0040 50%, #280060 100%); }

    /* dots pattern overlay */
    .f-dots { position: absolute; inset: 0; background-image: radial-gradient(rgba(255,255,255,.06) 1px, transparent 1px); background-size: 32px 32px; pointer-events: none; }
    /* glow */
    .f-glow { position: absolute; border-radius: 50%; pointer-events: none; }

    /* logo */
    .f-logo { display: flex; align-items: center; gap: 14px; }

    .f-logo-text em { color: #FFD93D; font-style: normal; }
    .f-logo-sub { font-size: 11px; color: rgba(255,255,255,.45); text-transform: uppercase; letter-spacing: 2px; margin-top: 2px; }

    .f-gold { color: #FFD93D; }

    .f-cta-btn { background: #FFD93D; color: #0A2463; font-family: 'Montserrat',sans-serif; font-weight: 900; font-size: 20px; padding: 16px 36px; border-radius: 50px; letter-spacing: .3px; }

    /* ── CARD UI elements ── */

    .ui-cat { display: inline-flex; align-items: center; gap: 6px; background: rgba(23,86,200,.25); border: 1px solid rgba(23,86,200,.4); color: #7ab3ff; font-size: 13px; font-weight: 700; font-family: 'Montserrat',sans-serif; padding: 6px 14px; border-radius: 50px; }
    .ui-cat.active { background: #FFD93D; color: #0A2463; border-color: #FFD93D; }
    .ui-card { background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.1); border-radius: 16px; overflow: hidden; }
    .ui-card-img { height: 120px; background: linear-gradient(135deg,#0e1e3a,#1a3a8f); display: flex; align-items: center; justify-content: center; font-size: 52px; position: relative; }
    .ui-card-body { padding: 12px 14px; }

    .ui-card-loc { font-size: 12px; color: #7a90b8; margin-top: 4px; }

    .ui-step { display: flex; align-items: flex-start; gap: 20px; }
    .ui-step-num { width: 56px; height: 56px; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-family: 'Montserrat',sans-serif; font-weight: 900; font-size: 24px; flex-shrink: 0; }
    .ui-step-title { font-family: 'Montserrat',sans-serif; font-weight: 800; font-size: 22px; color: #e8f0ff; margin-bottom: 5px; }

    .ui-badge { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 50px; font-family: 'Montserrat',sans-serif; font-weight: 800; font-size: 14px; }

  function scaleFrames() {

      const w = outer.offsetWidth;
      const scale = w / 1080;
      frame.style.transform = `scale(${scale})`;
      outer.style.height = (1080 * scale) + 'px';
    });
  }
